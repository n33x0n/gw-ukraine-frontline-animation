<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ukraina - Linia frontu</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=8">
</head>

<body>

    <div id="loading">
        <div class="spinner" id="spinner"></div>
        <div id="loading-text">Pobieranie danych z Githuba...</div>
        <div id="error-msg"></div>
    </div>

    <div id="date-label"></div>

    <div id="map"></div>
    <div id="inset-map"></div>

    <div id="controls">
        <button id="btn-play" class="btn-icon">▶ Odtwórz</button>
        <button id="btn-pause" class="btn-icon" style="display: none;">⏸ Pauza</button>
        <button id="btn-reset" class="btn-icon"
            style="padding: 8px 12px; display: flex; align-items: center; justify-content: center;" title="Odśwież">
            <svg style="width: 16px; height: 16px; fill: currentColor;" viewBox="0 0 512 512"
                xmlns="http://www.w3.org/2000/svg">
                <!-- Font Awesome Free 6.4.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. -->
                <path
                    d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 86.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z" />
            </svg>
        </button>
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

    <script src="script.js?v=8"></script>
</body>

</html>
